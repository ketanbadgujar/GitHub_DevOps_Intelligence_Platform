# ─────────────────────────────────────────────────────────────────────────────
# Phase 6 — Dashboard CI/CD
# Save as: .github/workflows/dashboard.yml
# Or merge the `dashboard` job into your existing ci.yml workflow.
# ─────────────────────────────────────────────────────────────────────────────

name: Dashboard CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'

jobs:
  build-and-test:
    name: Build & Lint Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package.json

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 7

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: false          # set to true + add registry login to push
          tags: devops-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
